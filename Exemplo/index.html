        function validar() {
            const inputNome = document.getElementById("nome")
            if (inputNome.value == '') {
                alert("O nome deve ser informado")
                inputNome.focus()
                return
            }
            const inputEmail = document.getElementById("email")
            if (inputEmail.value == '') {
                alert("O email deve ser informado")
                inputEmail.focus()
                return
            }
            const meuParagrafo = document.getElementById("demo")
            meuParagrafo.innerText = ("Olá " + inputNome.value)

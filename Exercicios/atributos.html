<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .texto{
            color: red;
            font-size: 18;
        }
    </style>
</head>
<body>
    <button onclick="atribuirCss()">atribuir</button>
    <p>Ola mundo</p>

    <p>Holla Mundo</p>

    <button onclick="esconder()">esconder</button>
    <div id="mundoInseto">
        o mundo invisivel dos insetos
    </div>

    <script>
        function atribuirCss(){
            const myP = document.getElementsByTagName('p')[0]

            myP.setAttribute('class','texto')
            console.log(myP)

            const outroP = document.getElementsByTagName('p')[1]
            console.log(outroP)
            outroP.style.color = 'yellow'            
        }


        function esconder(){
           const myDiv = document.getElementById('mundoInseto')
           const myBt = document.getElementsByTagName('button')[1]

           if(myBt.innerHTML === 'esconder'){
              myDiv.style.display = 'none'
              myBt.innerHTML = 'mostrar'
           }
           else{
              myDiv.style.display = 'block'
              myBt.innerHTML = 'esconder'
           }
           
           
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="estilos.css">
</head>

<body>
    <div class="container">
        <div class="numeros" id="A" >A</div>
        <div class="numeros" id="B" >B</div>
        <div class="numeros" id="C" >C</div>
        <div class="numeros" id="D" >D</div>
        <div class="numeros" id="E" >E</div>
        <div class="numeros" id="F" >F</div>
        <div class="numeros" id="G" >G</div>
        <div class="numeros" id="H" >H</div>
        <div class="numeros" id="I" >I</div>
        <div class="numeros" id="J" >J</div>
    </div>

    <script>
        const numerosDiv = document.querySelectorAll('.numeros')
        for (let j = 0; j < 10; j++)
            for (let i = 0; i < 9; i++) {
                const bt = document.createElement('button')

                bt.innerHTML = i + 1;
                bt.id = numerosDiv[j].id + (i + 1)
                bt.className = 'livre'
                bt.onclick = () => selecionar(numerosDiv[j].id + (i + 1))
                numerosDiv[j].appendChild(bt);
            }

        function selecionar(id) {
            const selecionado = document.querySelector('#' + id)
            console.log(selecionado)
            selecionado.classList.toggle('ocupado');
            selecionado.classList.toggle('livre');


        }
    </script>
</body>

</html>
